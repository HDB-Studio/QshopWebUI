<script>
try {
  eval("/* ==========================================================\n * app.js вҖ?QshopWebUI дё»еә”з”ЁйҖ»иҫ‘\n *   еҠҹиғҪпјҡ\n *     1. Three.js 3D з«Ӣж–№дҪ“жёІжҹ“пјҲйқһдәӨдә’пјҢзәҜи§Ҷи§үпјү\n *     2. жқҗиҙЁеҢ…з®ЎзҗҶпјҲZIP / зӣ®еҪ• / URLпјү\n *     3. NBT JSON еҸҜи§ҶеҢ–пјҲеҸӘиҜ»еұ•зӨәпјү\n *     4. е•Ҷеә—еҲ—иЎЁпјҲзӯӣйҖ?жҺ’еәҸ/д»·ж јеҜ№жҜ”пјү\n *     5. з®ЎзҗҶеҗҺеҸ° + ж•°жҚ®з®ЎзҗҶ\n * ========================================================== */\n(function(global) {\n    'use strict';\n\n    // =============== е°ҸеһӢ DOM е·Ҙе…· ===============\n    const $ = (sel, parent) => (parent || document).querySelector(sel);\n    const $$ = (sel, parent) => Array.from((parent || document).querySelectorAll(sel));\n    const el = (tag, attrs = {}, children = []) => {\n        const n = document.createElement(tag);\n        Object.keys(attrs).forEach(k => {\n            if (k === 'class') n.className = attrs[k];\n            else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(n.style, attrs[k]);\n            else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);\n            else if (attrs[k] !== null && attrs[k] !== undefined) n.setAttribute(k, attrs[k]);\n        });\n        (Array.isArray(children) ? children : [children]).forEach(c => {\n            if (c == null) return;\n            if (typeof c === 'string' || typeof c === 'number') n.appendChild(document.createTextNode(c));\n            else n.appendChild(c);\n        });\n        return n;\n    };\n\n    // =============== жёІжҹ“зҠ¶жҖ?===============\n    const state = {\n        sort: 'price',\n        keyword: '',\n        worldFilter: 'all',\n        typeFilter: 'all',\n        currentTab: 'shops',\n        // Three.js еңәжҷҜзј“еӯҳпјҲжҜҸдёӘеҚЎзүҮдёҖдёӘпјү\n        _scenes: []\n    };\n\n    // =============== жқҗиҙЁйўңиүІеӣһйҖҖж–№жЎҲ ===============\n    const MATERIAL_COLORS = {\n        DIAMOND:      { main: '#6de4d8', light: '#a6f4ec', dark: '#2d8c84' },\n        IRON_INGOT:   { main: '#d9d9d9', light: '#f2f2f2', dark: '#7a7a7a' },\n        GOLD_INGOT:   { main: '#fcd95a', light: '#fff0a8', dark: '#b88a1f' },\n        NETHERITE_INGOT: { main: '#5b4a4a', light: '#8d7070', dark: '#2d2020' },\n        QUARTZ:       { main: '#efe8dc', light: '#ffffff', dark: '#a69888' },\n        EMERALD:      { main: '#27c46a', light: '#6fe4a1', dark: '#127840' },\n        COAL:         { main: '#2c2c2c', light: '#5a5a5a', dark: '#000000' },\n        REDSTONE:     { main: '#ff3a3a', light: '#ff9a9a', dark: '#8b0000' },\n        LAPIS_LAZULI: { main: '#2d6fd6', light: '#6fa8ff', dark: '#15397c' },\n        OAK_PLANKS:   { main: '#a87845', light: '#d2a177', dark: '#5f3d1f' },\n        DIRT:         { main: '#8b6b4a', light: '#b29171', dark: '#5f3d1f' }\n    };\n    function colorFor(m) { return MATERIAL_COLORS[m] || { main: '#b0b0b0', light: '#e0e0e0', dark: '#444' }; }\n\n    // =============== Toast ===============\n    function showToast(msg) {\n        const t = el('div', { class: 'toast' }, msg);\n        document.body.appendChild(t);\n        setTimeout(() => t.remove(), 1800);\n    }\n\n    // ============================================================\n    // #1: Three.js 3D з«Ӣж–№дҪ“пјҲйқһдәӨдә’гҖҒиҮӘеҠЁж—ӢиҪ¬пјү\n    // ============================================================\n    /**\n     * ең?container дёӯжёІжҹ“дёҖдё?Minecraft з«Ӣж–№дҪ“гҖӮ\n     * дҪҝз”Ё Three.js зҡ?BoxGeometry + 6 йқўжқҗиҙЁгҖӮ\n     * - иӢ?material е·Іжңүиҙҙеӣҫпјҡеә”з”Ёиҙҙеӣҫ\n     * - еҗҰеҲҷпјҡеә”з”ЁзәҜиүІпјҲMATERIAL_COLORSпјүпјҢе№¶ж·»еҠ й»‘иүІжҸҸиҫ№иҫ№жЎҶ\n     */\n    function renderCubeInContainer(container, material, textureMap) {\n        if (!global.THREE) return renderCSSFallback(container, material);\n\n        // вҖ”вҖ?жё…зҗҶж—?canvas вҖ”вҖ”\n        container.innerHTML = '';\n\n        const settings = QSDB.getSettings();\n        if (settings.enable3D === false) return renderCSSFallback(container, material);\n\n        // вҖ”вҖ?иҺ·еҸ–е°әеҜё вҖ”вҖ”\n        const rect = container.getBoundingClientRect();\n        const width = Math.max(rect.width, 100);\n        const height = Math.max(rect.height, 140);\n\n        // вҖ”вҖ?Scene / Camera / Renderer вҖ”вҖ”\n        const scene = new THREE.Scene();\n        scene.background = new THREE.Color('#0f0f12');\n\n        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);\n        camera.position.set(2.4, 1.8, 3.0);\n        camera.lookAt(0, 0, 0);\n\n        const renderer = new THREE.WebGLRenderer({ antialias: true });\n        renderer.setSize(width, height);\n        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n        container.appendChild(renderer.domElement);\n\n        // вҖ”вҖ?е…үз…§пј? зӣҸпјҢи®©дёҚеҗҢйқўжңүеұӮж¬Ўж„ҹпјҢеғҸ MinecraftпјүвҖ”вҖ”\n        scene.add(new THREE.AmbientLight('#ffffff', 0.65));\n        const dir = new THREE.DirectionalLight('#ffffff', 0.6);\n        dir.position.set(3, 5, 4);\n        scene.add(dir);\n\n        // вҖ”вҖ?зә№зҗҶ / йўңиүІ вҖ”вҖ”\n        const texUrl = textureMap && textureMap[material];\n        let materials6;\n\n        if (texUrl) {\n            // дҪҝз”Ёиө„жәҗеҢ…зә№зҗҶ\n            const loader = new THREE.TextureLoader();\n            const tex = loader.load(\n                texUrl,\n                () => renderer.render(scene, camera),\n                undefined,\n                () => { /* еҠ иҪҪеӨұиҙҘеӣһйҖҖеҲ°йўңиү?*/ }\n            );\n            tex.magFilter = THREE.NearestFilter;  // еғҸзҙ йЈҺпјҒ\n            tex.minFilter = THREE.NearestFilter;\n            tex.generateMipmaps = false;\n            materials6 = [\n                new THREE.MeshLambertMaterial({ map: tex }), // +XпјҲеҸіпјү\n                new THREE.MeshLambertMaterial({ map: tex }), // -XпјҲе·Ұпјү\n                new THREE.MeshLambertMaterial({ map: tex }), // +YпјҲдёҠпјү\n                new THREE.MeshLambertMaterial({ map: tex }), // -YпјҲдёӢпјү\n                new THREE.MeshLambertMaterial({ map: tex }), // +ZпјҲеүҚпјү\n                new THREE.MeshLambertMaterial({ map: tex })  // -ZпјҲеҗҺпјү\n            ];\n        } else {\n            // зәҜиүІпјҡдёҠ/дё?дҫ?дҪҝз”Ёдёүз§ҚиүІи°ғпјҢжЁЎжӢ?Minecraft з«Ӣж–№еқ—зҡ„е…үз…§еұӮж¬Ў\n            const c = colorFor(material);\n            const mkMat = (hex) => new THREE.MeshLambertMaterial({ color: hex });\n            const main = mkMat(c.main);\n            materials6 = [\n                main, main,             // е·ҰеҸі\n                mkMat(c.light),         // дёҠ\n                mkMat(c.dark),          // дёӢ\n                main, main              // еүҚеҗҺ\n            ];\n        }\n\n        // вҖ”вҖ?з«Ӣж–№дҪ“дё»дҪ?вҖ”вҖ”\n        const cubeGeo = new THREE.BoxGeometry(1, 1, 1);\n        const cube = new THREE.Mesh(cubeGeo, materials6);\n        cube.position.set(0, 0, 0);\n        scene.add(cube);\n\n        // вҖ”вҖ?й»‘иүІиҫ№жЎҶзәҝпјҲжЁЎд»ҝ Minecraft еқ—зҡ„зІ—иҫ№пјүвҖ”вҖ”\n        const edges = new THREE.EdgesGeometry(cubeGeo);\n        const edgeLine = new THREE.LineSegments(\n            edges,\n            new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 })\n        );\n        cube.add(edgeLine);\n\n        // вҖ”вҖ?еӣәе®ҡеҲқе§Ӣи§’еәҰпјҲжЁЎжӢҹзӯүи·қи§ҶеӣҫпјүвҖ”вҖ”\n        cube.rotation.x = -0.35;\n        cube.rotation.y = 0.6;\n\n        // вҖ”вҖ?иҮӘеҠЁж—ӢиҪ¬пјҲйқһдәӨдә’пјҒд»…и§Ҷи§үеҠЁз”»пјүвҖ”вҖ”\n        let raf = null;\n        let last = performance.now();\n        function animate(now) {\n            const dt = (now - last) / 1000;\n            last = now;\n            cube.rotation.y += dt * 0.35;   // жҜҸз§’зә?20В°\n            cube.rotation.x += dt * 0.15;\n            renderer.render(scene, camera);\n            raf = requestAnimationFrame(animate);\n        }\n        raf = requestAnimationFrame(animate);\n\n        // и®°еҪ•пјҢд»Ҙдҫҝд№ӢеҗҺжё…зҗҶ\n        state._scenes.push({ renderer, raf, cube });\n    }\n\n    /**\n     * еҪ“жІЎжң?Three.js жҲ–з”ЁжҲ·е…ій—?3D ж—¶зҡ„ CSS еӣһйҖҖ\n     * д»Қз„¶жҳҜиҮӘеҠЁж—ӢиҪ¬зҡ„з«Ӣж–№дҪ“пјҢдҪҶдҪҝз”?CSS 3D transforms\n     */\n    function renderCSSFallback(container, material) {\n        const c = colorFor(material);\n        const cube = el('div', { class: 'cube3d' });\n        const mkFace = (bg, tf) => {\n            const f = el('div', {\n                class: 'face',\n                style: { transform: tf, background: bg, border: '2px solid rgba(0,0,0,0.4)', width: '80px', height: '80px' }\n            });\n            cube.appendChild(f);\n        };\n        mkFace(c.main,  'translateZ(40px)');\n        mkFace(c.dark,  'rotateY(180deg) translateZ(40px)');\n        mkFace(c.dark,  'rotateY(90deg) translateZ(40px)');\n        mkFace(c.light, 'rotateY(-90deg) translateZ(40px)');\n        mkFace(c.light, 'rotateX(90deg) translateZ(40px)');\n        mkFace(c.dark,  'rotateX(-90deg) translateZ(40px)');\n\n        container.innerHTML = '';\n        container.appendChild(cube);\n    }\n\n    // =============== жё…зҗҶ Three.js еңәжҷҜ ===============\n    function disposeAllScenes() {\n        state._scenes.forEach(s => {\n            try { cancelAnimationFrame(s.raf); } catch {}\n            try { s.renderer.dispose(); } catch {}\n            try {\n                const dom = s.renderer.domElement;\n                if (dom && dom.parentNode) dom.parentNode.removeChild(dom);\n            } catch {}\n        });\n        state._scenes = [];\n    }\n\n    // ============================================================\n    // #2: NBT JSON еҸҜи§ҶеҢ–пјҲеҸӘиҜ»йқўжқҝпјү\n    // ============================================================\n    function renderNBTPanel(nbt) {\n        if (!nbt || Object.keys(nbt).length === 0) {\n            return el('div', {\n                class: 'nbt-panel',\n                style: { marginTop: '8px', fontSize: '11px', color: '#888', padding: '6px 8px' }\n            }, 'пјҲж—  NBT ж•°жҚ®пј?);\n        }\n        const body = el('div', { class: 'nbt-panel-body' });\n        body.textContent = JSON.stringify(nbt, null, 2);\n        const panel = el('div', { class: 'nbt-panel' }, [\n            el('div', { class: 'nbt-panel-header' }, [\n                el('strong', {}, 'рҹ§ҫ NBT ж•°жҚ®пјҲеҸӘиҜ»пјү'),\n                el('span', { style: { marginLeft: 'auto', color: '#aaa', fontWeight: '400', fontSize: '10px' } }, 'Minecraft JSON-NBT')\n            ]),\n            body\n        ]);\n        return panel;\n    }\n\n    // ============================================================\n    // #3: е•Ҷеә—еҚЎзүҮпјҲж ёеҝғи§Ҷи§үпјү\n    // ============================================================\n    function renderShopCard(shop, harbor, avg, textureMap) {\n        const card = el('div', { class: 'shop-card' });\n\n        // вҖ”вҖ?е·Ұдҫ§пј?D з«Ӣж–№дҪ“е®№еҷ?вҖ”вҖ”\n        const left = el('div', { class: 'shop-card-left' });\n        card.appendChild(left);\n\n        // вҖ”вҖ?еҸідҫ§пјҡдҝЎжҒҜеҢә вҖ”вҖ”\n        const right = el('div', { class: 'shop-card-right' });\n        card.appendChild(right);\n\n        // йЎ¶йғЁпјҡзү©");
  log("Lines 0-~200: OK", true);
} catch(e) {
  log("Lines 0-~200: " + e.message, false);
}
</script>

<script>
try {
  eval("е“ҒеҗҚ / зұ»еһӢ tag / еҗҲзҗҶ tag\n        const header = el('div', { class: 'shop-card-header' }, [\n            el('div', { class: 'shop-title' }, [\n                el('div', { class: 'shop-name' }, shop.item_name),\n                el('small', {\n                    class: 'shop-material',\n                    style: { fontSize: '11px', color: '#666', fontFamily: 'monospace', display: 'block', marginTop: '2px' }\n                }, shop.material)\n            ]),\n            el('div', { style: { display: 'flex', gap: '4px' } }, [\n                (() => {\n                    const s = el('span', { class: 'tag-sell' }, shop.shop_type);\n                    if (shop.shop_type === 'BUYING') {\n                        s.textContent = 'ж”¶иҙӯ';\n                        s.style.background = '#fed7aa';\n                    } else s.textContent = 'еҮәе”®';\n                    return s;\n                })(),\n                (() => {\n                    const b = el('span', {\n                        class: 'badge ' + (shop.price_reasonable ? 'badge-ok' : 'badge-warn')\n                    }, shop.price_reasonable ? 'вң?еҗҲзҗҶ' : 'вҡ?еҒҸй«ҳ');\n                    return b;\n                })()\n            ])\n        ]);\n        right.appendChild(header);\n\n        // иЎЁж јпјҡеә—дё?д»·ж ј/е ҶеҸ /еқҗж Ү/и·қзҰ»\n        const kv = el('table', { class: 'kv-table' });\n        function row(label, value) {\n            kv.appendChild(el('tr', {}, [\n                el('td', { style: { width: '42%', color: '#666' } }, label),\n                el('td', {}, value)\n            ]));\n        }\n        row('еә—дё»', shop.owner_name);\n        row('д»·ж ј', el('span', { class: 'price-col' }, shop.price.toFixed(2)));\n        row('е ҶеҸ ', String(shop.stacking_amount));\n        row('еқҗж Ү', shop.world + ' В· (' + shop.x + ', ' + shop.y + ', ' + shop.z + ')');\n        if (harbor) {\n            const d = QSDB.distance(shop, harbor);\n            row('и·қжёҜеҸ?, d + ' ж ?);\n        }\n        right.appendChild(kv);\n\n        // NBT йқўжқҝ\n        right.appendChild(renderNBTPanel(shop.nbt));\n\n        // д»·ж јеҜ№жҜ”жқЎ\n        const compare = el('div', { class: 'shop-card-compare' });\n        const title = el('div', {\n            class: 'shop-card-compare-title',\n            style: { fontSize: '11px', fontWeight: '800', marginBottom: '4px', marginTop: '6px' }\n        }, 'рҹ’№ д»·ж јеҺҶеҸІеҜ№жҜ”');\n        compare.appendChild(title);\n\n        const barBg = el('div', {\n            style: {\n                position: 'relative', height: '14px', background: '#e5e7eb',\n                border: '2px solid #000', overflow: 'hidden'\n            }\n        });\n        if (avg.avg) {\n            const diff = shop.price - avg.avg;\n            const pct = (diff / avg.avg) * 100;\n            const clampedPct = Math.max(-50, Math.min(50, pct));\n            const barWidth = 50 + clampedPct;\n            const barFill = el('div', {\n                style: {\n                    height: '100%', width: barWidth + '%',\n                    background: pct > 5 ? '#ef4444' : pct < -5 ? '#10b981' : '#3b82f6',\n                    transition: 'width 0.3s, background 0.3s'\n                }\n            });\n            barBg.appendChild(barFill);\n            const mid = el('div', {\n                style: {\n                    position: 'absolute', top: '-3px', left: '50%',\n                    width: '2px', height: '20px', background: '#000'\n                }\n            });\n            barBg.appendChild(mid);\n        }\n        compare.appendChild(barBg);\n\n        const info = el('div', {\n            style: { fontSize: '11px', marginTop: '4px', display: 'flex', justifyContent: 'space-between' }\n        }, [\n            el('span', {}, 'еҪ“еүҚ: ' + shop.price.toFixed(2)),\n            el('span', { style: { color: '#666' } }, 'еқҮд»·: ' + (avg.avg ? avg.avg.toFixed(2) : 'вҖ?)),\n            (() => {\n B.read(\'qshop_price_history\', {});\n        const tex = QSDB.getTextureMap();\n\n        const statGrid = el(\'div\', {\n            style: { display: \'grid\', gridTemplateColumns: \'repeat(auto-fit, minmax(140px, 1fr))\', gap: \'10px\' }\n        });\n        const mkStat = (label, big) => el(\'div\', {\n            style: {\n                background: \'#fff\', border: \'3px solid #000\', boxShadow: \'3px 3px 0 #000\',\n                padding: \'10px\', fontSize: \'12px\'\n            }\n        }, [\n            el(\'div\', {}, label),\n            el(\'div\', {\n                style: { fontSize: \'24px\', fontWeight: \'900\', marginTop: \'4px\', color: \'#3b82f6\' }\n            }, String(big))\n        ]);\n        statGrid.appendChild(mkStat(\'е•Ҷеә—жҖ»ж•°\', shops.length));\n        statGrid.appendChild(mkStat(\'дёҚеҗҢзү©е“Ғ\', new Set(shops.map(s => s.material)).size));\n        statGrid.appendChild(mkStat(\'еә—дё»ж•°йҮҸ\', new Set(shops.map(s => s.owner_name)).size));\n        statGrid.appendChild(mkStat(\'еҺҶеҸІд»·ж јжқЎзӣ®\', Object.keys(hist).length));\n        statGrid.appendChild(mkStat(\'иҙҙеӣҫе·ІеҠ иҪҪ\', Object.keys(tex).length));\n        statGrid.appendChild(mkStat(\'иҜ·жұӮж—Ҙеҝ—\', QSDB.getFetchLog().length));\n        c3.appendChild(statGrid);\n        root.appendChild(c3);\n\n        // вҖ”вҖ?API зӨәдҫӢ вҖ”вҖ”\n        const c4 = el(\'div\', { class: \'component-card\' });\n        c4.appendChild(el(\'h3\', {}, \'рҹ”Ң API жҺҘе…ҘзӨәдҫӢ\'));\n        c4.appendChild(el(\'div\', { style: { fontSize: \'12px\', marginBottom: \'8px\', color: \'#555\' } },\n            \'еҸӘйңҖжҠ?API иҝ”еӣһзҡ?JSON е–Ӯз»ҷ QSDB.ingest(data)пјҢз„¶еҗҺеҲҮжҚўеҲ°е•Ҷеә—жҖ»и§ҲеҚіеҸҜеҲ·ж–°йЎөйқўгҖӮ\'\n        ));\n        const codeBlock = el(\'pre\', {\n            class: \'code-editor\',\n            style: {\n                fontFamily: \'monospace\', fontSize: \'11px\',\n                background: \'#1f1f1f\', color: \'#e5e7eb\',\n                padding: \'12px\', border: \'3px solid #000\',\n                whiteSpace: \'pre\', overflowX: \'auto\', lineHeight: \'1.5\'\n            }\n        });\n        codeBlock.textContent =\n`// ж–№ејҸ A: еҜ№жҺҘзңҹе®һ API\nfetch(\'/api/shops\')\n  .then(r => r.json())\n  .then(data => {\n     const r = QSDB.ingest(data);\n     console.log(\'ж–°еўһ:\' + r.added + \' жӣҙж–°:\' + r.updated);\n     QS_UI.switchTab(\'shops\');\n  });\n\n// ж–№ејҸ B: жҺ§еҲ¶еҸ°зӣҙжҺҘжіЁе…ҘпјҲз”ЁдәҺжөӢиҜ•пјү\nQSDB.ingest([{\n  shop_id: 999, owner_name: "Test",\n  material: "DIAMOND", item_name: "й’»зҹі",\n  price: 45, stacking_amount: 64,\n  shop_type: "SELLING", world: "world",\n  x: 100, y: 64, z: -200,\n  price_reasonable: true,\n  nbt: { display: { Name: \'{"text":"й’»зҹі"}\' },\n         Enchantments: [{ id: "fortune", lvl: 2 }] }\n}]);\n\n// ж–№ејҸ C: жүӢеҠЁж“ҚдҪң\nQSDB.getShops()          // иҜ»еҸ–е…ЁйғЁе•Ҷеә—\nQSDB.computeAvgForMaterial(\'DIAMOND\')  // и®Ўз®—жҹҗзү©е“Ғзҡ„еҺҶеҸІеқҮд»·\nQSDB.getHarbor()         // иҜ»еҸ–жёҜеҸЈеқҗж Ү\nQSDB.setTextureMap(map)  // еҶҷе…ҘиҮӘе®ҡд№үиҙҙеӣҫжҳ е°„`;\n        c4.appendChild(codeBlock);\n        root.appendChild(c4);\n    }\n\n    // ============================================================\n    // #7: Tab еҲҮжҚўдё»и·Ҝз”ұ\n    // ============================================================\n    function switchTab(tab) {\n        state.currentTab = tab;\n        $$(\'.nav-item\').forEach(n => {\n            n.classList.toggle(\'active\', n.dataset.tab === tab);\n        });\n        const area = $(\'#content-area\');\n        area.innerHTML = \'\';\n\n        // еҲҮжҚў tab ж—¶е…Ҳжё…зҗҶж—?Three.js еңәжҷҜ\n        disposeAllScenes();\n\n        if (tab === \'shops\') renderShopsOverview(area);\n        else if (tab === \'admin\') renderAdmin(area);\n        else if (tab === \'data\') renderDataIO(area);\n    }\n\n    // =============== еҗҜеҠЁ ===============\n    document.addEventListener(\'DOMContentLoaded\', () => {\n        // и®ҫзҪ®дҫ§иҫ№ж ?nav-item зҡ?data-tab\n        $$(\'.nav-item\').forEach(n => {\n            n.addEventListener(\'click\', () => {\n                const tab = n.dataset.tab || n.getAttribute(\'data-tab\');\n                switchTab(tab);\n            });\n        });\n        switchTab(\'shops\');\n    });\n\n    // =============== еҜ№еӨ–жҡҙйңІ API ===============\n    global.QS_UI = {\n        switchTab: switchTab,\n        showToast: showToast,\n        renderShopsOverview: renderShopsOverview,\n        renderAdmin: renderAdmin,\n        renderDataIO: renderDataIO\n    };\n})(window);\n');
  log("Lines ~800-end: OK", true);
